name: Feature Request
description: Suggest a new tool, improvement, or feature for Tengu
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What use case does it address?
      placeholder: Currently Tengu cannot do X, which means I have to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you'd like to see.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which area of Tengu does this affect?
      options:
        - New tool (recon)
        - New tool (web scanning)
        - New tool (injection)
        - New tool (exploitation)
        - New tool (brute force)
        - New tool (OSINT)
        - New tool (other)
        - Existing tool improvement
        - Security / safety
        - Infrastructure / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there existing tools or workarounds that partially address this?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, links, or references relevant to the request.
